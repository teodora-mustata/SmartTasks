name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build, test, and measure coverage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: SmartTasksAPI

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore SmartTasksAPI.sln

      - name: Build solution
        run: dotnet build SmartTasksAPI.sln --configuration Release --no-restore

      - name: Run tests with coverage output
        run: >
          dotnet test SmartTasksAPI.sln
          --configuration Release
          --no-build
          --results-directory TestResults
          --logger "trx;LogFileName=test-results.trx"
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput=TestResults/Coverage/

      - name: Install report generator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Add global tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Generate coverage report
        run: >
          reportgenerator
          -reports:"SmartTasksAPI.Tests/TestResults/Coverage/coverage.cobertura.xml"
          -targetdir:"SmartTasksAPI.Tests/TestResults/CoverageReport"
          -reporttypes:"HtmlInline_AzurePipelines;Cobertura"

      - name: Enforce coverage thresholds (line 80%, branch 75%)
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET

          line_threshold = 0.80
          branch_threshold = 0.75
          coverage_path = "SmartTasksAPI.Tests/TestResults/Coverage/coverage.cobertura.xml"

          root = ET.parse(coverage_path).getroot()
          line_rate = float(root.attrib["line-rate"])
          branch_rate = float(root.attrib["branch-rate"])

          if line_rate < line_threshold:
              raise SystemExit(f"Line coverage {line_rate:.2%} is below threshold {line_threshold:.2%}")

          if branch_rate < branch_threshold:
              raise SystemExit(f"Branch coverage {branch_rate:.2%} is below threshold {branch_threshold:.2%}")

          print(
              "Coverage checks passed: "
              f"line={line_rate:.2%} (min {line_threshold:.2%}), "
              f"branch={branch_rate:.2%} (min {branch_threshold:.2%})"
          )
          PY

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: SmartTasksAPI/TestResults/**/*.trx

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            SmartTasksAPI/SmartTasksAPI.Tests/TestResults/CoverageReport
            SmartTasksAPI/SmartTasksAPI.Tests/TestResults/Coverage/coverage.cobertura.xml

  frontend-tests:
    name: Frontend unit and smoke E2E
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: SmartTasksAPI/smarttasks-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SmartTasksAPI/smarttasks-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Angular unit tests
        run: npm run test:ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke E2E tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-artifacts
          path: |
            SmartTasksAPI/smarttasks-frontend/playwright-report
            SmartTasksAPI/smarttasks-frontend/test-results
